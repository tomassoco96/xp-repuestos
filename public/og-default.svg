<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1D1D1B"/>
      <stop offset="100%" stop-color="#0E0E0E"/>
    </linearGradient>
    <pattern id="grid" width="64" height="64" patternUnits="userSpaceOnUse">
      <path d="M 64 0 L 0 0 0 64" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Logo: círculo + XP a la izquierda -->
  <g transform="translate(80, 165)">
    <circle cx="150" cy="150" r="130" stroke="#E20613" stroke-width="22" fill="none" stroke-linecap="round" stroke-dasharray="700 110" transform="rotate(-115 150 150)"/>
    <text x="150" y="200" text-anchor="middle" font-family="'Saira Stencil One', 'Saira Condensed', 'Impact', sans-serif" font-style="italic" font-weight="900" font-size="170" fill="#FFFFFF" letter-spacing="-6">xp</text>
  </g>

  <!-- Texto principal a la derecha -->
  <g transform="translate(440, 200)">
    <text font-family="'Montserrat', system-ui, sans-serif" font-weight="900" fill="#F5F5F5" font-size="86" letter-spacing="-2" text-transform="uppercase">
      <tspan x="0" y="0">TU MOTO</tspan>
      <tspan x="0" y="100" fill="#E20613" font-style="italic" font-family="'Saira Condensed', sans-serif">no para.</tspan>
    </text>
    <text font-family="'Montserrat', system-ui, sans-serif" font-weight="500" fill="#F5F5F5" fill-opacity="0.7" font-size="26" x="0" y="180">
      Repuestos y accesorios para motos
    </text>
    <text font-family="'Montserrat', system-ui, sans-serif" font-weight="500" fill="#F5F5F5" fill-opacity="0.7" font-size="26" x="0" y="215">
      en toda la Argentina · CABA
    </text>
  </g>

  <!-- Strip inferior con marcas -->
  <rect x="0" y="555" width="1200" height="2" fill="#E20613"/>
  <text x="80" y="600" font-family="'Montserrat', system-ui, sans-serif" font-weight="700" font-size="18" fill="#F5F5F5" fill-opacity="0.6" letter-spacing="3">
    HONDA · YAMAHA · GILERA · ZANELLA · MOTOMEL · KELLER · MONDIAL
  </text>
  <text x="1120" y="600" font-family="'Montserrat', system-ui, sans-serif" font-weight="900" font-size="20" fill="#E20613" text-anchor="end" letter-spacing="2">
    XPREPUESTOS.COM.AR
  </text>
</svg>
